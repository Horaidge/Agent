{% if error %}
<p class="err">{{ error }}</p>
{% else %}
<div class="video-upload-ok">
  <p class="muted video-upload-ok-line">
    {% if slot == 'last' %}
    🎞 Последний кадр загружен: <code>{{ filename }}</code>
    {% else %}
    🎬 Первый кадр загружен: <code>{{ filename }}</code>
    {% endif %}
  </p>
  {% if slot == 'last' %}
  <input type="hidden" name="last_frame_upload_id" value="{{ upload_id }}" form="form-video-job"/>
  {% else %}
  <input type="hidden" name="upload_id" value="{{ upload_id }}" form="form-video-job"/>
  {% endif %}
</div>
{% endif %}

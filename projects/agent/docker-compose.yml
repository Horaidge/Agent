# Проект «Агент» — Next.js (голос / VAPI) на отдельном порту от основного стека.
# Использование:
#   cp config/.env.example config/.env   # и заполнить
#   docker compose up -d --build
#
# URL: http://localhost:3001

services:
  agent-frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VAPI_PUBLIC_KEY: ${NEXT_PUBLIC_VAPI_PUBLIC_KEY:-}
        NEXT_PUBLIC_VAPI_ASSISTANT_ID: ${NEXT_PUBLIC_VAPI_ASSISTANT_ID:-}
    env_file:
      - ./config/.env
    ports:
      - "3001:3000"
    restart: unless-stopped

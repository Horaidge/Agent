# Отдельный MongoDB — не зависит от стека Agent/Content.
# Запуск:  docker compose -f docker-compose.mongo.yml up -d
# Остановка: docker compose -f docker-compose.mongo.yml down
# Данные:    именованный том mongo_standalone_data
#
# Подключение с хоста (Python/бот на этой же машине):
#   MONGODB_URI=mongodb://127.0.0.1:27017
#
# Подключение из другого Docker-контейнера на этой же машине:
#   MONGODB_URI=mongodb://host.docker.internal:27017
#   (в compose сервиса добавьте: extra_hosts: ["host.docker.internal:host-gateway"])

services:
  mongo:
    image: mongo:7
    container_name: infra_mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_standalone_data:/data/db

volumes:
  mongo_standalone_data:

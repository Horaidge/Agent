events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name smartagentplatform.ru www.smartagentplatform.ru;
        client_max_body_size 20M;

        # Telegram webhook -> Content service
        # Set WEBHOOK_PATH=/telegram/webhook in projects/content/.env
        location = /telegram/webhook {
            set $content_upstream content:8000;
            proxy_pass http://$content_upstream/webhook;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Content service UI/API on prefixed path
        # Example: /content/ui, /content/health, /content/dev
        location /content/ {
            set $content_upstream content:8000;
            rewrite ^/content/(.*)$ /$1 break;
            proxy_pass http://$content_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Mini Telegram-бот: просмотр журнала (MONITOR_SECRET_TOKEN в telegram-mini-bot/.env)
        location = /mini-bot-monitor {
            return 302 /mini-bot-monitor/;
        }

        location /mini-bot-monitor/ {
            set $telegram_bot_monitor_upstream telegram_bot_monitor:8765;
            proxy_pass http://$telegram_bot_monitor_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent (React/Next.js) on domain root
        location / {
            set $agent_upstream agent:3000;
            proxy_pass http://$agent_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

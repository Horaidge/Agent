{% for j in jobs %}
<tr class="video-job-row"
    hx-get="/dev/partials/video/job_detail?job_id={{ j._id }}"
    hx-target="#video-job-detail"
    hx-swap="innerHTML">
  <td><span class="video-st video-st-{{ j.status }}">{{ j.status }}</span></td>
  <td class="mono">{% if j.created_at %}{{ j.created_at[:19] }}{% else %}—{% endif %}</td>
  <td>{{ j.source_type or "—" }}</td>
  <td class="preview">{{ (j.prompt or "")[:80] }}{% if j.prompt and j.prompt|length > 80 %}…{% endif %}</td>
  <td class="mono">{{ j.model }}</td>
</tr>
{% else %}
<tr><td colspan="5" class="muted">Пока нет video jobs в MongoDB</td></tr>
{% endfor %}

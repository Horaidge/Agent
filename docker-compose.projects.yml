# Сборка agent: NEXT_PUBLIC_* подставляются в build args только если задать env для compose, например:
#   docker-compose --env-file ./projects/agent/config/.env -f docker-compose.projects.yml build agent
# (одного env_file у сервиса для рантайма недостаточно — см. документацию Compose 1.x)

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.projects.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
      - content
      - telegram_bot_monitor
    restart: unless-stopped

  agent:
    build:
      context: ./projects/agent/app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VAPI_PUBLIC_KEY: ${NEXT_PUBLIC_VAPI_PUBLIC_KEY:-}
        NEXT_PUBLIC_VAPI_ASSISTANT_ID: ${NEXT_PUBLIC_VAPI_ASSISTANT_ID:-}
    env_file:
      - ./projects/agent/config/.env
    ports:
      # Системный nginx (sites-available/voice) проксирует HTTPS → этот порт
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  # Backend: тот же entrypoint, что и локально (python main.py). В .env на хосте часто
  # MONGODB_URI=mongodb://localhost:27017 — внутри сети compose подставляем сервис mongo.
  # Референсы для моделей: OpenAI (чат/JSON) и DashScope/Qwen (картинки) берут ключи из .env;
  # форматы тел (текст vs image URL/data URI) задаются кодом сервиса, не образом.
  content:
    build:
      context: ./projects/content
      dockerfile: Dockerfile
    env_file:
      - ./projects/content/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      UVICORN_RELOAD: "false"
      # Нужен для автосборки webhook URL (PUBLIC_BASE_URL + WEBHOOK_PATH).
      PUBLIC_BASE_URL: https://smartagentplatform.ru
      # Совпадает с location /content/ на nginx (не GRADIO_ROOT_PATH — его читает сам Gradio и ломает /ui)
      GRADIO_PROXY_PREFIX: /content
    # Если на хосте уже занят 8000 (run_dev.sh), снаружи используем 8002 → 8000 в контейнере.
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - content_mongo_data:/data/db

  # Монитор переписок mini Telegram-бота: https://smartagentplatform.ru/mini-bot-monitor/
  # Журнал: projects/telegram-mini-bot/data/audit/turns.jsonl (бот должен писать туда на этом хосте).
  telegram_bot_monitor:
    build:
      context: ./projects/telegram-mini-bot
      dockerfile: Dockerfile.monitor
    env_file:
      - ./projects/telegram-mini-bot/.env
    environment:
      MONITOR_DATA_DIR: /app/data
      MONITOR_HOST: 0.0.0.0
    ports:
      # Внешний nginx (или браузер по SSH-туннелю) → http://127.0.0.1:8765/
      - "127.0.0.1:8765:8765"
    volumes:
      - ./projects/telegram-mini-bot/data:/app/data:ro
    restart: unless-stopped

volumes:
  content_mongo_data:

{% if user_ids %}
<ul class="user-pick">
  {% for uid in user_ids %}
  <li>
    <button type="button"
      class="user-pick-btn"
      hx-get="/dev/partials/video/asset_picker?uid={{ uid }}"
      hx-target="#video-asset-picker"
      hx-swap="innerHTML">
      user_id {{ uid }}
    </button>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="muted">Нет пользователей с dream_assets.</p>
{% endif %}
